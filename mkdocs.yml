
site_name: GAME DEV WORKSHOP DOCS
nav:
  - Home: index.md
  - Content: Content Page.md
  - Unity installation: Unity Installation.md
  - Introduction: 1-Introduction.md
  - Creating the Game: 2-Creating the Game.md
  - Character Development: 3-Character Development.md
  - Turn System: 4-Turn System.md
  - Health System: 5-Health System.md
  - Adding Obstacles: 6-Adding Obstacles.md
  - Beating the Game: 7-Beating the game.md
  - Animation: 8-Animation.md
  - Adding an Enemy: 9-Adding an enemy.md
  - Conclusion: 10-Conclusion.md
theme:
  name: material
  logo: images/logo.png  # Place your logo in docs/images/
  favicon: images/favicon.ico  # Place your favicon in docs/images/
  extra_css: 
    - stylesheets/compact.css  # Custom CSS for compact design  
  
  palette:
    - scheme: default
      primary: indigo
      accent: pink 
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.footer
    - navigation.sections
    - search.highlight
    - search.suggest
    - toc.integrate
  density: compact
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/yourusername
markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - pymdownx.highlight
  - pymdownx.superfences  
  - toc:
      permalink: true

